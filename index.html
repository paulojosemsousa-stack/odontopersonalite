<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoControl Cloud v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .kanban-column { min-height: 500px; transition: background-color 0.2s; }
        .kanban-ghost { opacity: 0.3; background: #cbd5e1; border: 2px dashed #64748b; }
        .nav-active { background-color: #2563eb; color: white; shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-tooth text-xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-tight">Odonto<span class="text-blue-600">Cloud</span></h1>
                    <div id="sync-status" class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                        <i class="fas fa-circle text-[6px]"></i> <span>Offline</span>
                    </div>
                </div>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
                <button onclick="switchTab('manager')" id="tab-manager" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">GERENTE</button>
                <button onclick="switchTab('dentist')" id="tab-dentist" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">DENTISTA</button>
                <button onclick="switchTab('client')" id="tab-client" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">CLIENTE</button>
                <button onclick="switchTab('settings')" id="tab-settings" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <section id="view-settings" class="max-w-xl mx-auto space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <h2 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fab fa-github text-blue-600"></i> Banco de Dados Cloud</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Usuário GitHub</label>
                            <input type="text" id="db-user" placeholder="ex: joaosilva" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Repositório</label>
                            <input type="text" id="db-repo" placeholder="minha-clinica-dados" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Personal Access Token (PAT)</label>
                        <input type="password" id="db-token" placeholder="ghp_xxxxxxxxxxxx" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button onclick="connectDB()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all">CONECTAR SISTEMA</button>
                </div>
            </div>

            <div id="admin-setup" class="bg-white p-8 rounded-3xl shadow-md border border-slate-100 hidden animate-fade-in">
                <h3 class="font-bold mb-4">Corpo Clínico e Contatos</h3>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="new-dentist-name" placeholder="Nome do Dentista" class="flex-1 p-3 border rounded-xl outline-none">
                        <select id="new-dentist-spec" class="p-3 border rounded-xl outline-none bg-slate-50">
                            <option>Clínico Geral</option>
                            <option>Ortodontia</option>
                            <option>Implantodontia</option>
                        </select>
                        <button onclick="addDentist()" class="bg-slate-900 text-white px-4 rounded-xl font-bold">+</button>
                    </div>
                    <div id="dentist-list" class="flex flex-wrap gap-2 py-2"></div>
                    <hr>
                    <input type="text" id="wa-manager" placeholder="WhatsApp Gerente (ex: 5511999999999)" class="w-full p-3 border rounded-xl outline-none">
                    <button onclick="saveGlobalConfigs()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Salvar Parâmetros</button>
                </div>
            </div>
        </section>

        <section id="view-client" class="hidden max-w-lg mx-auto py-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                <div class="text-center space-y-2">
                    <h2 class="text-3xl font-black">Agende Agora</h2>
                    <p class="text-slate-400 text-sm">Escolha o especialista e receba confirmação no WhatsApp.</p>
                </div>
                
                <div class="space-y-4">
                    <select id="client-dentist" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500"></select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="client-date" class="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                        <select id="client-period" class="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                            <option value="Manhã">Manhã</option>
                            <option value="Tarde">Tarde</option>
                        </select>
                    </div>
                    <button onclick="createAppointment()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 active:scale-95 transition-all">
                        SOLICITAR AGENDAMENTO
                    </button>
                </div>
            </div>
        </section>

        <section id="view-manager" class="hidden space-y-8">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black">Gestão da Clínica</h2>
                    <p class="text-slate-400 font-medium">Controle o fluxo de pacientes em tempo real.</p>
                </div>
                <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-black text-sm">
                    Total: <span id="stat-total">0</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2">
                        <span class="w-2 h-2 bg-yellow-400 rounded-full"></span> Pendentes
                    </h4>
                    <div id="list-pending" class="kanban-column flex flex-col gap-3"></div>
                </div>

                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Em Cadeira
                    </h4>
                    <div id="list-active" class="kanban-column flex flex-col gap-3"></div>
                </div>

                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Concluídos
                    </h4>
                    <div id="list-done" class="kanban-column flex flex-col gap-3"></div>
                </div>
            </div>
        </section>

        <section id="view-dentist" class="hidden py-20 text-center">
            <i class="fas fa-calendar-check text-6xl text-slate-200 mb-4"></i>
            <h2 class="text-2xl font-black text-slate-800">Sua Agenda de Hoje</h2>
            <div id="dentist-agenda-list" class="max-w-md mx-auto mt-8 space-y-4"></div>
        </section>

    </main>

    <script>
        // --- ESTADO GLOBAL ---
        let db = { dentists: [], appointments: [], config: { waManager: "" } };
        let currentSha = null;

        // --- LÓGICA DE SINCRONIZAÇÃO GITHUB ---
        async function fetchFromGitHub() {
            const user = document.getElementById('db-user').value;
            const repo = document.getElementById('db-repo').value;
            const token = document.getElementById('db-token').value;

            if (!user || !repo || !token) return false;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    headers: { Authorization: `token ${token}` }
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                currentSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                updateUIStatus(true, "Conectado");
                renderAll();
                return true;
            } catch (e) {
                updateUIStatus(false, "Erro de Conexão");
                return false;
            }
        }

        async function pushToGitHub() {
            const user = document.getElementById('db-user').value;
            const repo = document.getElementById('db-repo').value;
            const token = document.getElementById('db-token').value;

            updateUIStatus(true, "Salvando...");

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Auto-sync OdontoCloud",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: currentSha
                    })
                });
                const data = await res.json();
                currentSha = data.content.sha;
                updateUIStatus(true, "Sincronizado");
            } catch (e) {
                updateUIStatus(false, "Falha ao gravar");
            }
        }

        // --- FUNÇÕES DE NEGÓCIO ---
        function connectDB() {
            fetchFromGitHub().then(success => {
                if(success) {
                    document.getElementById('admin-setup').classList.remove('hidden');
                    switchTab('manager');
                } else {
                    alert("Verifique os dados do GitHub (Usuário, Repo e Token PAT).");
                }
            });
        }

        function addDentist() {
            const name = document.getElementById('new-dentist-name').value;
            const spec = document.getElementById('new-dentist-spec').value;
            if(name) {
                db.dentists.push({ id: Date.now(), name, spec });
                document.getElementById('new-dentist-name').value = '';
                saveAndRender();
            }
        }

        function saveGlobalConfigs() {
            db.config.waManager = document.getElementById('wa-manager').value;
            saveAndRender();
        }

        function createAppointment() {
            const dentist = document.getElementById('client-dentist').value;
            const date = document.getElementById('client-date').value;
            const period = document.getElementById('client-period').value;

            if(!date || !dentist) return alert("Preencha todos os campos!");

            const newApp = { id: Date.now(), dentist, date, period, status: 'pending' };
            db.appointments.push(newApp);

            // WhatsApp link
            const wa = db.config.waManager;
            const msg = `🦷 *NOVO AGENDAMENTO*%0A*Dentista:* ${dentist}%0A*Data:* ${date}%0A*Período:* ${period}`;
            
            saveAndRender();
            window.open(`https://wa.me/${wa.replace(/\D/g,'')}?text=${msg}`, '_blank');
        }

        function saveAndRender() {
            renderAll();
            pushToGitHub();
        }

        // --- RENDERIZAÇÃO ---
        function renderAll() {
            // Dropdowns e Listas
            document.getElementById('client-dentist').innerHTML = db.dentists.map(d => `<option value="${d.name}">${d.name} (${d.spec})</option>`).join('');
            document.getElementById('dentist-list').innerHTML = db.dentists.map(d => `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black border border-blue-100 uppercase">${d.name}</span>`).join('');
            document.getElementById('wa-manager').value = db.config.waManager || "";
            document.getElementById('stat-total').innerText = db.appointments.length;

            // Kanban
            const renderCard = (a) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 cursor-grab active:cursor-grabbing hover:shadow-md transition-all" data-id="${a.id}">
                    <p class="font-black text-sm">${a.dentist}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${a.date} • ${a.period}</p>
                </div>
            `;

            document.getElementById('list-pending').innerHTML = db.appointments.filter(a => a.status === 'pending').map(renderCard).join('');
            document.getElementById('list-active').innerHTML = db.appointments.filter(a => a.status === 'active').map(renderCard).join('');
            document.getElementById('list-done').innerHTML = db.appointments.filter(a => a.status === 'done').map(renderCard).join('');
        }

        // --- UI AUX ---
        function switchTab(tabId) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + tabId).classList.add('nav-active');

            if(tabId === 'manager') initKanban();
        }

        function updateUIStatus(online, text) {
            const el = document.getElementById('sync-status');
            el.className = `flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest ${online ? 'text-emerald-500' : 'text-rose-500'}`;
            el.querySelector('span').innerText = text;
        }

        function initKanban() {
            const containers = ['list-pending', 'list-active', 'list-done'];
            containers.forEach(cid => {
                new Sortable(document.getElementById(cid), {
                    group: 'appointments',
                    animation: 150,
                    ghostClass: 'kanban-ghost',
                    onEnd: (evt) => {
                        const appId = evt.item.dataset.id;
                        const newStatus = evt.to.id.replace('list-', '');
                        const index = db.appointments.findIndex(a => a.id == appId);
                        db.appointments[index].status = newStatus;
                        pushToGitHub();
                    }
                });
            });
        }

        // Inicializar na aba de configurações para login
        switchTab('settings');
    </script>
</body>
</html>
