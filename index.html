<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OdontoPersonalité Mobile v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }
        body { background-color: #f1f5f9; touch-action: manipulation; }
        .bottom-nav a { transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        .bottom-nav a:active { transform: scale(0.95); background-color: #e2e8f0; }
        .card-draggable { touch-action: none; }
        .fc { background: white; border-radius: 1.5rem; overflow-x: auto; }
        .fc .fc-toolbar { flex-wrap: wrap; gap: 8px; padding: 12px; }
        .fc .fc-button { background: #f1f5f9; border: none; color: #1e293b; padding: 0.5rem 0.8rem; font-weight: bold; border-radius: 2rem; font-size: 0.75rem; }
        .fc .fc-button-primary { background: #2563eb; color: white; }
        .fc .fc-daygrid-day-number, .fc .fc-timegrid-slot-label { font-size: 0.7rem; }
        .fc .fc-daygrid-day { cursor: pointer; transition: background 0.1s; }
        .fc-daygrid-day-highlight { background-color: #dbeafe !important; border-radius: 8px; }
        .blocked-slot { background-color: #ef4444 !important; }
        .permission-tree { border-left: 2px solid #cbd5e1; margin-left: 0.75rem; padding-left: 0.75rem; }
        input, select, button { font-size: 16px !important; }
        .time-slot-selected { background-color: #22c55e !important; color: white !important; }
        .refresh-btn { background-color: #3b82f6; color: white; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.75rem; }
    </style>
</head>
<body>

            admin / JJPJ | joao.silva / 12345 | paciente.teste / 12345

</div>

<!-- BOTTOM NAVIGATION -->
<nav id="main-nav" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 z-50 hidden">
    <div id="bottom-nav" class="flex justify-around items-center py-2 px-2 bottom-nav"></div>
</nav>

<!-- TOP BAR -->
<div id="top-bar" class="hidden fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md border-b border-slate-200 z-40 px-4 py-3 flex justify-between items-center">

<main id="main-content" class="max-w-7xl mx-auto px-3 pb-20 pt-16 hidden">
    <!-- CLIENTE -->
    <section id="view-client" class="hidden space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
            <h2 class="text-xl font-black">1. Dentista e Data</h2>

        <div class="bg-slate-100 p-3 rounded-2xl"><h4 class="font-black text-blue-600">EM ATENDIMENTO</h4><div id="list-active" class="min-h-[200px] space-y-2 mt-2"></div></div>
        <div class="bg-slate-100 p-3 rounded-2xl"><h4 class="font-black text-emerald-600">FINALIZADOS</h4><div id="list-done" class="min-h-[200px] space-y-2 mt-2"></div></div>

    <!-- AGENDA DENTISTA -->
    <section id="view-dentist" class="hidden space-y-3">

    <!-- NPS -->
    <section id="view-nps" class="hidden space-y-4">
        <div class="bg-white p-5 rounded-2xl text-center"><span class="text-xs text-slate-400">NPS SCORE</span><p id="nps-score" class="text-3xl font-black text-blue-600">0</p></div>
        <div class="bg-white p-3 rounded-2xl"><canvas id="chart-nps" class="w-full h-64"></canvas></div>

    <!-- CONFIGURAÇÕES -->
    <section id="view-settings" class="hidden space-y-4">
        <div class="bg-white p-4 rounded-2xl space-y-3">
            <h3 class="font-bold"><i class="fab fa-github"></i> GitHub Cloud</h3>
            <input type="text" id="db-user" value="paulojosemsousa-stack" class="w-full p-2 border rounded-lg bg-slate-50" readonly>
            <input type="text" id="db-repo" value="odontopersonalite" class="w-full p-2 border rounded-lg bg-slate-50" readonly>
            <input type="password" id="db-token" placeholder="Token" class="w-full p-2 border rounded-lg" value="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">
            <button onclick="syncCloud()" class="w-full bg-slate-800 text-white py-2 rounded-xl">Sincronizar</button>
        </div>
        <div class="bg-white p-4 rounded-2xl space-y-3">
            <h3><i class="fab fa-whatsapp text-green-600"></i> WhatsApp API</h3>
            <select id="wa-provider" class="w-full p-2 border rounded-lg"><option value="evolution">Evolution API</option><option value="zapi">Z-API</option></select>
            <input type="text" id="wa-instance" placeholder="URL / Instância" class="w-full p-2 border rounded-lg">
            <input type="text" id="wa-token" placeholder="Token" class="w-full p-2 border rounded-lg">
            <button onclick="testWhatsApp()" class="w-full bg-green-600 text-white py-2 rounded-xl">Testar</button>
            <div id="wa-status" class="text-xs"></div>
        </div>
        <div class="bg-white p-4 rounded-2xl space-y-3">
            <h3><i class="fas fa-users"></i> Usuários</h3>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="reg-name" placeholder="Nome" class="p-2 border rounded-lg">
                <input type="text" id="reg-cpf" placeholder="CPF" class="p-2 border rounded-lg">
                <select id="reg-role" class="p-2 border rounded-lg"><option value="owner">Owner</option><option value="manager">Manager</option><option value="dentist">Dentist</option><option value="client">Client</option></select>
                <input type="tel" id="reg-whatsapp" placeholder="WhatsApp" class="p-2 border rounded-lg">
                <input type="text" id="reg-login" placeholder="Login" class="p-2 border rounded-lg">

            <input type="hidden" id="reg-id">
            <div class="flex gap-2"><button onclick="saveUser()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl">Salvar</button><button onclick="resetUserForm()" id="btn-cancel-edit" class="hidden px-4 bg-slate-200 py-2 rounded-xl">Cancelar</button></div>
            <div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr><th class="p-1">Nome</th><th>Role</th><th>Ações</th></tr></thead><tbody id="user-table"></tbody></table></div>

        <div class="bg-white p-4 rounded-2xl space-y-3">
            <h3><i class="fas fa-key"></i> Permissões</h3>
            <div id="permissions-tree" class="space-y-3"></div>
            <button onclick="savePermissions()" class="w-full bg-emerald-600 text-white py-2 rounded-xl">Salvar</button>
        </div>
    </section>
</main>

<script>
    // ==================== CONFIGURAÇÃO GLOBAL ====================
    const GITHUB_TOKEN = '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';
    let db = { users: [], appointments: [], blocks: [], npsResponses: [], config: { whatsapp: {}, permissions: {} } };
    let currentSha = null, currentUser = null, selectedDate = null, selectedTime = null, isBlockMode = false;
    let dentistCalendar = null, npsChart = null, currentDentistForCalendar = null;
    let clientCalendar = null;
    let selectedTimeButton = null;

    const MODULES = {
        client: { name: "Cliente", icon: "fa-calendar-check", actions: ["agendar"] },
        manager: { name: "Fluxo", icon: "fa-tasks", actions: ["mover_cards"] },
        dentist: { name: "Agenda", icon: "fa-tooth", actions: ["ver_agenda", "bloquear_horarios"] },
        nps: { name: "NPS", icon: "fa-chart-line", actions: ["ver_grafico"] },
        settings: { name: "Ajustes", icon: "fa-cog", actions: ["gerenciar_usuarios", "configurar_whatsapp", "configurar_permissoes", "sincronizar_github"] }
    };
    const DEFAULT_PERMISSIONS = {
        owner: { client: true, manager: true, dentist: true, nps: true, settings: true, actions: { agendar: true, mover_cards: true, ver_agenda: true, bloquear_horarios: true, ver_grafico: true, gerenciar_usuarios: true, configurar_whatsapp: true, configurar_permissoes: true, sincronizar_github: true } },
        manager: { client: false, manager: true, dentist: true, nps: true, settings: true, actions: { agendar: false, mover_cards: true, ver_agenda: true, bloquear_horarios: false, ver_grafico: true, gerenciar_usuarios: true, configurar_whatsapp: true, configurar_permissoes: true, sincronizar_github: true } },
        dentist: { client: false, manager: false, dentist: true, nps: false, settings: false, actions: { agendar: false, mover_cards: false, ver_agenda: true, bloquear_horarios: true, ver_grafico: false, gerenciar_usuarios: false, configurar_whatsapp: false, configurar_permissoes: false, sincronizar_github: false } },
        client: { client: true, manager: false, dentist: false, nps: false, settings: false, actions: { agendar: true, mover_cards: false, ver_agenda: false, bloquear_horarios: false, ver_grafico: false, gerenciar_usuarios: false, configurar_whatsapp: false, configurar_permissoes: false, sincronizar_github: false } }
    };

    function ensureDbStructure() {
        if (!db.users) db.users = [];
        if (!db.appointments) db.appointments = [];
        if (!db.blocks) db.blocks = [];
        if (!db.npsResponses) db.npsResponses = [];
        if (!db.config) db.config = {};
        if (!db.config.whatsapp) db.config.whatsapp = { provider: "evolution", instance: "", token: "" };
        if (!db.config.permissions) db.config.permissions = JSON.parse(JSON.stringify(DEFAULT_PERMISSIONS));
        if (db.users.length === 0) {
            db.users = [
                { id: 1, name: "Admin Master", cpf: "00000000000", role: "owner", login: "admin", pass: "JJPJ", whatsapp: "" },
                { id: 2, name: "Dr. João Silva", cpf: "11111111111", role: "dentist", login: "joao.silva", pass: "12345", whatsapp: "5511999999999" },
                { id: 3, name: "Gerente Carla", cpf: "22222222222", role: "manager", login: "gerente", pass: "12345", whatsapp: "" },
                { id: 4, name: "Paciente Teste", cpf: "33333333333", role: "client", login: "paciente.teste", pass: "12345", whatsapp: "5511988888888" }
            ];
        }
        // Garantir que todos os nomes estejam normalizados
        db.users.forEach(u => { u.name = u.name.trim(); });
        db.appointments.forEach(a => { a.dentist = a.dentist.trim(); });
        db.blocks.forEach(b => { b.dentist = b.dentist.trim(); });
    }

    function utf8ToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function base64ToUtf8(base64) {
        try { let decoded = atob(base64).replace(/^\uFEFF/, ''); return decodeURIComponent(escape(decoded)); } catch(e) { return ""; }
    }

    // GitHub sync
    async function syncCloud() {
        updateStatus(false, "Conectando...");
        const repoUser = document.getElementById('db-user').value;
        const repoName = document.getElementById('db-repo').value;
        const apiUrl = `https://api.github.com/repos/${repoUser}/${repoName}/contents/db.json`;
        try {
            let res = await fetch(apiUrl, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
            if (res.status === 404) {
                const content = utf8ToBase64(JSON.stringify({ users: [], appointments: [], blocks: [], npsResponses: [], config: {} }, null, 2));
                const putRes = await fetch(apiUrl, { method: 'PUT', headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" }, body: JSON.stringify({ message: "init", content }) });
                if (!putRes.ok) throw new Error("Erro ao criar");
                const putData = await putRes.json();
                currentSha = putData.content.sha;
                db = { users: [], appointments: [], blocks: [], npsResponses: [], config: {} };
                ensureDbStructure();
                updateStatus(true, "Conectado");
                renderAll();
                return;
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            currentSha = data.sha;
            let decoded = base64ToUtf8(data.content).trim();
            if (!decoded.startsWith('{')) decoded = decoded.substring(decoded.indexOf('{'));
            db = JSON.parse(decoded);
            ensureDbStructure();
            updateStatus(true, "Conectado");
            renderAll();
        } catch(e) { updateStatus(false, "Erro"); alert("Erro: "+e.message); }
    }
    async function saveAndPush() {
        const repoUser = document.getElementById('db-user').value;
        const repoName = document.getElementById('db-repo').value;
        const apiUrl = `https://api.github.com/repos/${repoUser}/${repoName}/contents/db.json`;
        if (!currentSha) { localStorage.setItem('odonto_mobile', JSON.stringify(db)); updateStatus(false, "Offline"); return; }
        try {
            const content = utf8ToBase64(JSON.stringify(db, null, 2));
            const res = await fetch(apiUrl, { method: 'PUT', headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" }, body: JSON.stringify({ message: "update", content, sha: currentSha }) });
            if (!res.ok) throw new Error("Erro");
            const data = await res.json();
            currentSha = data.content.sha;
            updateStatus(true, "Salvo");
        } catch(e) { updateStatus(false, "Erro save"); localStorage.setItem('odonto_mobile', JSON.stringify(db)); }
    }
    function updateStatus(on, txt) {
        const s = document.getElementById('sync-status');
        s.className = `flex items-center gap-1 text-[10px] font-black ${on ? 'text-emerald-500' : 'text-rose-500'}`;
        s.querySelector('span').innerText = txt;
    }

    // WhatsApp
    async function sendWhatsApp(toNumber, message) {
        const wa = db.config.whatsapp;
        if (!wa.instance || !wa.token) { console.warn("Simulação:", message); alert(`[SIMULAÇÃO] WhatsApp para ${toNumber}: ${message}`); return true; }
        try {
            let url = "", body = {};
            if (wa.provider === "evolution") {
                url = `${wa.instance}/message/sendText/${wa.instance.split('/').pop()}`;
                body = { number: toNumber, text: message };
            } else {
                url = `https://api.z-api.io/instances/${wa.instance}/token/${wa.token}/send-text`;
                body = { phone: toNumber, message };
            }
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Client-Token': wa.token }, body: JSON.stringify(body) });
            return res.ok;
        } catch(e) { return false; }
    }
    async function sendAppointmentConfirmation(appointment) {
        const dentist = db.users.find(u => u.name === appointment.dentist);
        if (!dentist?.whatsapp) return;
        const patient = db.users.find(u => u.id === appointment.patientId);
        const msg = `🦷 *Novo agendamento*\nPaciente: ${patient?.name || "Cliente"}\nData: ${appointment.date}\nHorário: ${appointment.time}`;
        await sendWhatsApp(dentist.whatsapp, msg);
    }
    async function sendNpsSurvey(appointment) {
        const patient = db.users.find(u => u.id === appointment.patientId);
        if (!patient?.whatsapp) return;
        const msg = `🦷 *OdontoPersonalité*\nSua consulta com ${appointment.dentist} foi finalizada. Responda com uma nota de 0 a 10:`;
        const sent = await sendWhatsApp(patient.whatsapp, msg);
        if (sent) {
            const nota = prompt(`Paciente ${patient.name} (${patient.whatsapp})\nDigite a nota (0-10):`);
            if (nota !== null && !isNaN(nota) && nota >= 0 && nota <= 10) {
                if (!db.npsResponses) db.npsResponses = [];
                db.npsResponses.push({ patientId: patient.id, appointmentId: appointment.id, score: parseInt(nota), date: new Date().toISOString() });
                await saveAndPush();
                updateNPSChart();
                alert(`Nota ${nota} registrada!`);
            }
        }
    }
    async function testWhatsApp() {
        const provider = document.getElementById('wa-provider').value;
        const instance = document.getElementById('wa-instance').value.trim();
        const token = document.getElementById('wa-token').value.trim();
        if (!instance || !token) { alert("Preencha todos os campos"); return; }
        db.config.whatsapp = { provider, instance, token };
        await saveAndPush();
        const testNumber = currentUser?.whatsapp || "5511999999999";
        const ok = await sendWhatsApp(testNumber, "🧪 Teste de conexão!");
        document.getElementById('wa-status').innerHTML = ok ? '<span class="text-green-600">✅ Conectado</span>' : '<span class="text-red-600">❌ Falha</span>';
    }

    // Permissões
    function renderPermissionsTree() {
        const container = document.getElementById('permissions-tree');
        container.innerHTML = '';
        const roles = ['owner', 'manager', 'dentist', 'client'];
        for (let role of roles) {
            const perms = db.config.permissions[role] || JSON.parse(JSON.stringify(DEFAULT_PERMISSIONS[role]));
            const card = document.createElement('div');
            card.className = 'border rounded-xl p-3 bg-slate-50 mb-3';
            card.innerHTML = `<h4 class="font-black text-sm mb-2">${role.toUpperCase()}</h4>`;
            for (let mod in MODULES) {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 text-sm';
                const chk = document.createElement('input');
                chk.type = 'checkbox'; chk.checked = perms[mod] === true;
                chk.onchange = (e) => { perms[mod] = e.target.checked; };
                const label = document.createElement('label');
                label.innerText = MODULES[mod].name;
                div.appendChild(chk); div.appendChild(label);
                card.appendChild(div);
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'permission-tree ml-4 text-xs';
                MODULES[mod].actions.forEach(action => {
                    const actDiv = document.createElement('div');
                    const actChk = document.createElement('input');
                    actChk.type = 'checkbox';
                    if (!perms.actions) perms.actions = {};
                    actChk.checked = perms.actions[action] === true;
                    actChk.onchange = (e) => { perms.actions[action] = e.target.checked; };
                    const actLabel = document.createElement('label');
                    actLabel.innerText = action.replace('_', ' ');
                    actDiv.appendChild(actChk); actDiv.appendChild(actLabel);
                    actionsDiv.appendChild(actDiv);
                });
                card.appendChild(actionsDiv);
            }
            container.appendChild(card);
        }
    }
    async function savePermissions() {
        const roles = ['owner', 'manager', 'dentist', 'client'];
        const newPerms = {};
        for (let role of roles) {
            const card = Array.from(document.querySelectorAll('#permissions-tree > div')).find(c => c.innerText.includes(role.toUpperCase()));
            if (!card) continue;
            const rolePerms = {};
            let modIndex = 0;
            for (let mod in MODULES) {
                const chk = card.querySelectorAll('input[type="checkbox"]')[modIndex];
                rolePerms[mod] = chk.checked;
                modIndex++;
            }
            const actions = {};
            const actionCheckboxes = card.querySelectorAll('.permission-tree input[type="checkbox"]');
            MODULES[Object.keys(MODULES)[0]].actions.forEach((act, idx) => { actions[act] = actionCheckboxes[idx]?.checked || false; });
            rolePerms.actions = actions;
            newPerms[role] = rolePerms;
        }
        db.config.permissions = newPerms;
        await saveAndPush();
        alert("Permissões salvas! Recarregue.");
        location.reload();
    }
    function hasPermission(module, action = null) {
        const perms = db.config.permissions[currentUser?.role] || DEFAULT_PERMISSIONS[currentUser?.role];
        if (!perms) return false;
        if (action) return perms.actions?.[action] === true;
        return perms[module] === true;
    }

    // Autenticação e navegação
    function doLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const found = db.users.find(x => x.login === u && x.pass === p);
        if (found) { currentUser = found; start(); } else alert("Credenciais inválidas");
    }
    function start() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('main-nav').classList.remove('hidden');
        document.getElementById('top-bar').classList.remove('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        renderAll();
        buildBottomNav();
        const firstTab = Object.keys(MODULES).find(mod => hasPermission(mod));
        if (firstTab) switchTab(firstTab);
        else switchTab('client');
    }
    function buildBottomNav() {
        const navDiv = document.getElementById('bottom-nav');
        navDiv.innerHTML = '';
        for (let mod in MODULES) {
            if (hasPermission(mod)) {
                const btn = document.createElement('a');
                btn.href = '#';
                btn.className = 'flex flex-col items-center py-1 px-3 rounded-full text-slate-500';
                btn.innerHTML = `<i class="fas ${MODULES[mod].icon} text-xl"></i><span class="text-[10px] mt-1">${MODULES[mod].name}</span>`;
                btn.onclick = (e) => { e.preventDefault(); switchTab(mod); };
                btn.id = `tab-${mod}`;
                navDiv.appendChild(btn);
            }
        }
    }
    function switchTab(tabId) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.getElementById(`view-${tabId}`).classList.remove('hidden');
        document.querySelectorAll('#bottom-nav a').forEach(a => a.classList.remove('text-blue-600', 'font-bold'));
        const activeBtn = document.getElementById(`tab-${tabId}`);
        if (activeBtn) activeBtn.classList.add('text-blue-600', 'font-bold');
        if (tabId === 'manager') initKanban();
        if (tabId === 'client') initClientCalendar();
        if (tabId === 'dentist') loadDentistCalendar();
        if (tabId === 'nps') updateNPSChart();
        if (tabId === 'settings') { renderPermissionsTree(); loadUsersTable(); }
        applyUIPermissions();
    }
    function applyUIPermissions() {
        const blockBtn = document.getElementById('btn-block-mode');
        if (blockBtn) blockBtn.disabled = !hasPermission('dentist', 'bloquear_horarios');
    }

    // Usuários
    function loadUsersTable() {
        const tbody = document.getElementById('user-table');
        tbody.innerHTML = db.users.map(u => `<tr><td class="p-1">${u.name}</td><td class="p-1">${u.role}</td><td class="p-1"><button onclick="editUser(${u.id})" class="text-blue-500">Editar</button> <button onclick="deleteUser(${u.id})" class="text-rose-500">Excluir</button></td></tr>`).join('');
    }
    function saveUser() {
        const id = document.getElementById('reg-id').value;
        const name = document.getElementById('reg-name').value.trim();
        const cpf = document.getElementById('reg-cpf').value.replace(/\D/g,'');
        const role = document.getElementById('reg-role').value;
        const whatsapp = document.getElementById('reg-whatsapp').value;
        let login = document.getElementById('reg-login').value.trim();
        let pass = document.getElementById('reg-pass').value.trim();
        if (!name || cpf.length<5) return alert("Incompleto");
        if (!login) login = name.toLowerCase().split(' ')[0]+'.'+(name.toLowerCase().split(' ').pop());
        if (!pass) pass = cpf.substring(0,5);
        if (id) {
            const idx = db.users.findIndex(u=>u.id==id);
            db.users[idx] = {...db.users[idx], name, cpf, role, login, pass, whatsapp};
        } else {
            db.users.push({ id: Date.now(), name, cpf, role, login, pass, whatsapp });
        }
        resetUserForm();
        renderAll();
        saveAndPush();
    }
    function editUser(id) {
        const u = db.users.find(x=>x.id==id);
        document.getElementById('reg-id').value = u.id;
        document.getElementById('reg-name').value = u.name;
        document.getElementById('reg-cpf').value = u.cpf;
        document.getElementById('reg-role').value = u.role;
        document.getElementById('reg-whatsapp').value = u.whatsapp || '';
        document.getElementById('reg-login').value = u.login;
        document.getElementById('reg-pass').value = u.pass;
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
    }
    function resetUserForm() {
        document.getElementById('reg-id').value = '';
        document.getElementById('reg-name').value = '';
        document.getElementById('reg-cpf').value = '';
        document.getElementById('reg-whatsapp').value = '';
        document.getElementById('reg-login').value = '';
        document.getElementById('reg-pass').value = '';
        document.getElementById('btn-cancel-edit').classList.add('hidden');
    }
    function deleteUser(id) {
        if(confirm("Excluir?")) { db.users = db.users.filter(u=>u.id!=id); renderAll(); saveAndPush(); }
    }

    // Render geral
    function renderAll() {
        ensureDbStructure();
        loadUsersTable();
        const dts = db.users.filter(u=>u.role==='dentist');
        document.getElementById('c-dentist').innerHTML = dts.map(d=>`<option value="${d.name}">${d.name}</option>`).join('');
        const dentistSelect = document.getElementById('dentist-select');
        if(dentistSelect) {
            dentistSelect.innerHTML = '<option value="">Selecione</option>'+dts.map(d=>`<option value="${d.name}">${d.name}</option>`).join('');
            if(currentUser?.role==='dentist') { dentistSelect.value = currentUser.name; dentistSelect.disabled=true; }
            else dentistSelect.disabled=false;
        }
        const card = (a) => `<div class="bg-white p-3 rounded-xl shadow-sm border card-draggable card" data-id="${a.id}"><p class="font-bold text-sm">${a.dentist}</p><p class="text-xs">${a.date} ${a.time}</p><p class="text-[10px] text-slate-500">Paciente: ${db.users.find(u=>u.id===a.patientId)?.name||'?'}</p></div>`;
        document.getElementById('list-pending').innerHTML = db.appointments.filter(a=>a.status==='pending').map(card).join('');
        document.getElementById('list-active').innerHTML = db.appointments.filter(a=>a.status==='active').map(card).join('');
        document.getElementById('list-done').innerHTML = db.appointments.filter(a=>a.status==='done').map(card).join('');
        updateNPSChart();
        refreshDentistCalendar();
    }
    function refreshDentistCalendar() {
        if (dentistCalendar && currentDentistForCalendar) {
            dentistCalendar.refetchEvents();
            const debug = document.getElementById('debug-info');
            const count = db.appointments.filter(a => a.dentist === currentDentistForCalendar).length;
            debug.innerHTML = `Eventos no calendário: ${count} agendamentos para ${currentDentistForCalendar}`;
        }
    }
    function forceRefreshCalendar() {
        if (currentDentistForCalendar) {
            loadDentistCalendar(); // recria o calendário
            alert("Calendário recarregado!");
        } else {
            alert("Selecione um dentista primeiro.");
        }
    }

    // Kanban
    function initKanban() {
        ['list-pending','list-active','list-done'].forEach(id=>{
            new Sortable(document.getElementById(id), { group: 'tasks', animation:200, onEnd: async (evt)=>{
                const appId = evt.item.dataset.id;
                const newStatus = evt.to.id.replace('list-','');
                const app = db.appointments.find(a=>a.id==appId);
                if(app && app.status!==newStatus) {
                    app.status = newStatus;
                    await saveAndPush();
                    if(newStatus==='done') await sendNpsSurvey(app);
                    renderAll();
                    refreshDentistCalendar();
                }
            }});
        });
    }

    // Cliente
    function initClientCalendar() {
        const el = document.getElementById('client-mini-calendar');
        if (clientCalendar) clientCalendar.destroy();
        clientCalendar = new FullCalendar.Calendar(el, {
            initialView: 'dayGridMonth',
            locale: 'pt-br',
            height: 'auto',
            dateClick: (info) => {
                selectedDate = info.dateStr;
                renderTimeSlots();
                document.querySelectorAll('.fc-daygrid-day').forEach(day => day.classList.remove('fc-daygrid-day-highlight'));
                info.dayEl.classList.add('fc-daygrid-day-highlight');
            }
        });
        clientCalendar.render();
    }
    function renderTimeSlots() {
        if(!selectedDate) return;
        const times = ["08:00","09:00","10:00","11:00","14:00","15:00","16:00","17:00"];
        const dentist = document.getElementById('c-dentist').value.trim();
        const occupied = db.appointments.filter(a=>a.dentist===dentist && a.date===selectedDate).map(a=>a.time);
        const blocked = db.blocks.filter(b=>b.dentist===dentist && b.date===selectedDate).map(b=>b.time);
        const unavailable = [...occupied, ...blocked];
        const container = document.getElementById('time-slots');
        container.innerHTML = times.map(t => {
            const isUnavail = unavailable.includes(t);
            const isSelected = (selectedTime === t);
            return `<button onclick="selectTime('${t}')" class="p-2 rounded-xl font-bold text-sm transition-all ${isUnavail ? 'bg-red-100 text-slate-400 cursor-not-allowed' : (isSelected ? 'time-slot-selected' : 'bg-slate-100')}" ${isUnavail ? 'disabled' : ''}>${t}</button>`;
        }).join('');
    }
    function selectTime(t) {
        selectedTime = t;
        const btn = document.getElementById('btn-confirm-booking');
        btn.disabled = false;
        btn.classList.remove('opacity-50');
        renderTimeSlots();
    }
    async function confirmBooking() {
        if(!selectedDate||!selectedTime) return alert("Selecione data e horário");
        const dentist = document.getElementById('c-dentist').value.trim();
        if(db.appointments.find(a=>a.dentist===dentist && a.date===selectedDate && a.time===selectedTime)) return alert("Horário já ocupado");
        if(db.blocks.find(b=>b.dentist===dentist && b.date===selectedDate && b.time===selectedTime)) return alert("Horário bloqueado");
        const newApp = { id: Date.now(), dentist, date: selectedDate, time: selectedTime, status: 'pending', patientId: currentUser.id };
        db.appointments.push(newApp);
        await saveAndPush();
        await sendAppointmentConfirmation(newApp);
        alert("Agendamento confirmado!");
        selectedTime = null;
        renderTimeSlots();
        // Forçar atualização do calendário do dentista
        if (dentistCalendar && currentDentistForCalendar === dentist) {
            dentistCalendar.refetchEvents();
        } else {
            refreshDentistCalendar();
        }
        setTimeout(() => refreshDentistCalendar(), 500);
    }

    // Agenda Dentista (com debug)
    function loadDentistCalendar() {
        const dentistName = document.getElementById('dentist-select').value;
        if (!dentistName) {
            if (dentistCalendar) dentistCalendar.destroy();
            document.getElementById('dentist-calendar').innerHTML = '<div class="p-5 text-center text-slate-400">Selecione um dentista</div>';
            currentDentistForCalendar = null;
            return;
        }
        currentDentistForCalendar = dentistName;
        const calendarEl = document.getElementById('dentist-calendar');
        if (dentistCalendar) dentistCalendar.destroy();
        
        // Debug: quantos agendamentos existem para este dentista?
        const appointmentsForDentist = db.appointments.filter(a => a.dentist === currentDentistForCalendar);
        console.log(`Agendamentos para ${currentDentistForCalendar}:`, appointmentsForDentist);
        document.getElementById('debug-info').innerHTML = `Agendamentos encontrados: ${appointmentsForDentist.length}`;
        
        dentistCalendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'pt-br',
            slotMinTime: '08:00',
            slotMaxTime: '18:00',
            allDaySlot: false,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,dayGridMonth' },
            events: function(fetchInfo, successCallback, failureCallback) {
                const events = [];
                const dentist = currentDentistForCalendar;
                if (!dentist) {
                    successCallback([]);
                    return;
                }
                // Buscar todos os agendamentos deste dentista
                const apps = db.appointments.filter(app => app.dentist === dentist);
                apps.forEach(app => {
                    const patient = db.users.find(u => u.id === app.patientId);
                    events.push({
                        id: 'app-' + app.id,
                        title: patient ? patient.name : 'Paciente',
                        start: `${app.date}T${app.time}:00`,
                        color: '#3b82f6'
                    });
                });
                // Bloqueios
                const blocks = db.blocks.filter(block => block.dentist === dentist);
                blocks.forEach(block => {
                    events.push({
                        id: 'block-' + block.id,
                        title: 'BLOQUEADO',
                        start: `${block.date}T${block.time}:00`,
                        color: '#ef4444',
                        classNames: ['blocked-slot']
                    });
                });
                console.log(`Eventos gerados para ${dentist}:`, events);
                successCallback(events);
            },
            dateClick: async (info) => {
                const clickedCell = info.dayEl;
                if (clickedCell) {
                    document.querySelectorAll('.fc-daygrid-day').forEach(day => day.classList.remove('fc-daygrid-day-highlight'));
                    clickedCell.classList.add('fc-daygrid-day-highlight');
                }
                if (!isBlockMode || !hasPermission('dentist', 'bloquear_horarios')) return;
                const date = info.dateStr.split('T')[0];
                const time = info.dateStr.split('T')[1].substring(0,5);
                const existing = db.blocks.find(b => b.dentist === currentDentistForCalendar && b.date === date && b.time === time);
                if (existing) {
                    if (confirm("Remover bloqueio?")) {
                        db.blocks = db.blocks.filter(b => b.id !== existing.id);
                        await saveAndPush();
                        dentistCalendar.refetchEvents();
                    }
                } else {
                    if (confirm(`Bloquear ${time} em ${date}?`)) {
                        db.blocks.push({ id: Date.now(), dentist: currentDentistForCalendar, date, time });
                        await saveAndPush();
                        dentistCalendar.refetchEvents();
                    }
                }
            }
        });
        dentistCalendar.render();
    }
    function toggleBlockMode() {
        isBlockMode = !isBlockMode;
        const btn = document.getElementById('btn-block-mode');
        btn.innerText = `Bloqueio: ${isBlockMode ? 'ON' : 'OFF'}`;
        btn.classList.toggle('bg-red-600', isBlockMode);
        btn.classList.toggle('bg-slate-800', !isBlockMode);
        if (dentistCalendar) dentistCalendar.refetchEvents();
    }

    // NPS
    function updateNPSChart() {
        const responses = db.npsResponses || [];
        const avg = responses.length ? (responses.reduce((a,b)=>a+b.score,0)/responses.length).toFixed(1) : 0;
        document.getElementById('nps-score').innerText = avg;
        const counts = [0,0,0];
        responses.forEach(r=>{ if(r.score<=6) counts[0]++; else if(r.score<=8) counts[1]++; else counts[2]++; });
        const ctx = document.getElementById('chart-nps').getContext('2d');
        if(npsChart) npsChart.destroy();
        npsChart = new Chart(ctx, { type:'bar', data:{ labels:['Detratores','Neutros','Promotores'], datasets:[{ label:'Respostas', data:counts, backgroundColor:['#ef4444','#f59e0b','#10b981'] }] }, options:{ responsive: true, maintainAspectRatio: true } });
    }

    // Inicialização
    if(localStorage.getItem('odonto_mobile')) { try { db = JSON.parse(localStorage.getItem('odonto_mobile')); } catch(e){} }
    ensureDbStructure();
    renderAll();
    window.addEventListener('load', () => setTimeout(() => syncCloud(), 500));
</script>
</body>
</html>
