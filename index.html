<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoControl Pro | Agenda Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .nav-active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        
        /* Customização do Calendário para ficar Moderno */
        .fc { background: white; padding: 20px; border-radius: 24px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .fc-toolbar-title { font-weight: 800 !important; text-transform: capitalize; color: #1e293b; }
        .fc-button-primary { background-color: #2563eb !important; border: none !important; border-radius: 12px !important; font-weight: bold !important; text-transform: uppercase !important; font-size: 10px !important; }
        .fc-event { border: none !important; padding: 4px 8px !important; border-radius: 8px !important; cursor: pointer; }
        .fc-daygrid-day-number { font-weight: 700; color: #64748b; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-tooth text-xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-tight">Odonto<span class="text-blue-600">Cloud</span></h1>
                    <div id="sync-indicator" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-widest text-slate-400">
                        <i class="fas fa-circle text-[6px]"></i> <span>Sincronizando...</span>
                    </div>
                </div>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
                <button onclick="switchTab('manager')" id="tab-manager" class="nav-btn px-5 py-2 rounded-xl text-xs font-bold transition-all">GERENTE</button>
                <button onclick="switchTab('dentist')" id="tab-dentist" class="nav-btn px-5 py-2 rounded-xl text-xs font-bold transition-all">AGENDA DENTISTA</button>
                <button onclick="switchTab('client')" id="tab-client" class="nav-btn px-5 py-2 rounded-xl text-xs font-bold transition-all">CLIENTE</button>
                <button onclick="openSettings()" id="tab-settings" class="nav-btn px-5 py-2 rounded-xl text-xs font-bold transition-all"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <section id="view-dentist" class="hidden space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-800">Minha Agenda</h2>
                    <p class="text-slate-400 font-medium">Visualize seus atendimentos semanais e mensais.</p>
                </div>
                <div class="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border">
                    <i class="fas fa-filter text-blue-600"></i>
                    <select id="calendar-filter" onchange="refreshCalendar()" class="bg-transparent font-bold text-sm outline-none">
                        <option value="all">Ver Todos os Dentistas</option>
                    </select>
                </div>
            </div>

            <div id="calendar-container" class="animate-fade-in">
                <div id="calendar"></div>
            </div>
        </section>

        <section id="view-manager" class="hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2"><span class="w-2 h-2 bg-yellow-400 rounded-full"></span> Pendentes</h4>
                    <div id="list-pending" class="min-h-[400px] flex flex-col gap-3"></div>
                </div>
                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2"><span class="w-2 h-2 bg-blue-500 rounded-full"></span> Em Atendimento</h4>
                    <div id="list-active" class="min-h-[400px] flex flex-col gap-3"></div>
                </div>
                <div class="bg-slate-200/50 p-4 rounded-[2rem] flex flex-col gap-4">
                    <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2 flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Finalizados</h4>
                    <div id="list-done" class="min-h-[400px] flex flex-col gap-3"></div>
                </div>
            </div>
        </section>

        <section id="view-client" class="hidden max-w-lg mx-auto py-10">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-blue-50 text-center space-y-8">
                <h2 class="text-3xl font-black">Reserve seu Horário</h2>
                <div class="space-y-4 text-left">
                    <select id="c-dentist" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-blue-500"></select>
                    <input type="date" id="c-date" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-blue-500">
                    <select id="c-period" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-blue-500">
                        <option value="Manhã">Manhã (08h - 12h)</option>
                        <option value="Tarde">Tarde (13h - 18h)</option>
                    </select>
                    <button onclick="createBooking()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:scale-[1.02] transition-all">AGENDAR AGORA</button>
                </div>
            </div>
        </section>

        <section id="view-settings" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                    <h3 class="font-black text-blue-600 uppercase text-xs tracking-widest">Sincronização Cloud</h3>
                    <input type="text" id="db-user" value="paulojosemsousa-stack" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold" readonly>
                    <input type="text" id="db-repo" value="odontopersonalite" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold" readonly>
                    <input type="password" id="db-token" value="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" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold">
                    <button onclick="forceSync()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">SINCRONIZAR MANUAL</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                    <h3 class="font-black text-emerald-600 uppercase text-xs tracking-widest">Novo Profissional</h3>
                    <input type="text" id="new-d-name" placeholder="Nome do Dentista" class="w-full p-3 border rounded-xl text-sm outline-none">
                    <select id="new-d-spec" class="w-full p-3 border rounded-xl text-sm outline-none bg-slate-50">
                        <option>Clínico Geral</option>
                        <option>Ortodontia</option>
                        <option>Implantodontia</option>
                        <option>Estética</option>
                    </select>
                    <button onclick="addDentist()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Adicionar ao Corpo Clínico</button>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <h3 class="font-black mb-4">Configurações de Contato</h3>
                <input type="text" id="cfg-wa" placeholder="WhatsApp Gerente (Ex: 5562998078187)" class="w-full p-4 border rounded-2xl font-bold outline-none">
                <button onclick="saveConfigs()" class="mt-4 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">SALVAR TUDO</button>
            </div>
        </section>

    </main>

    <script>
        let db = { dentists: [], appointments: [], config: { wa: "" } };
        let currentSha = null;
        let calendar = null;

        // --- SEGURANÇA ---
        function openSettings() {
            if(prompt("Senha Administrativa:") === "JJPJ") switchTab('settings');
        }

        // --- GITHUB CLOUD ---
        async function sync() {
            const user = "paulojosemsousa-stack";
            const repo = "odontopersonalite";
            const token = document.getElementById('db-token').value;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    headers: { Authorization: `token ${token}` }
                });
                const data = await res.json();
                currentSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                updateStatus(true, "Online");
                render();
            } catch (e) {
                updateStatus(false, "Erro de Sincronia");
            }
        }

        async function push() {
            const user = "paulojosemsousa-stack";
            const repo = "odontopersonalite";
            const token = document.getElementById('db-token').value;
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update OdontoCloud Pro",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: currentSha
                    })
                });
                const data = await res.json();
                currentSha = data.content.sha;
                updateStatus(true, "Salvo");
            } catch (e) { updateStatus(false, "Falha ao Salvar"); }
        }

        // --- CALENDÁRIO ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                buttonText: { today: 'Hoje', month: 'Mês', week: 'Semana' },
                events: getCalendarEvents(),
                eventClick: (info) => {
                    alert(`Paciente: ${info.event.title}\nDentista: ${info.event.extendedProps.dentist}`);
                }
            });
            calendar.render();
        }

        function getCalendarEvents() {
            const filter = document.getElementById('calendar-filter').value;
            let apps = db.appointments;
            
            if(filter !== 'all') {
                apps = apps.filter(a => a.dentist === filter);
            }

            return apps.map(a => ({
                title: `Consulta: ${a.dentist}`,
                start: a.date,
                backgroundColor: a.status === 'done' ? '#10b981' : (a.status === 'active' ? '#2563eb' : '#f59e0b'),
                extendedProps: { dentist: a.dentist }
            }));
        }

        function refreshCalendar() {
            if(calendar) {
                calendar.removeAllEvents();
                calendar.addEventSource(getCalendarEvents());
            }
        }

        // --- NEGÓCIO ---
        function addDentist() {
            const name = document.getElementById('new-d-name').value;
            const spec = document.getElementById('new-d-spec').value;
            if(name) {
                db.dentists.push({ name, spec });
                document.getElementById('new-d-name').value = '';
                saveAndRender();
            }
        }

        function createBooking() {
            const dentist = document.getElementById('c-dentist').value;
            const date = document.getElementById('c-date').value;
            const period = document.getElementById('c-period').value;
            if(!date) return alert("Escolha a data!");

            db.appointments.push({ id: Date.now(), dentist, date, period, status: 'pending' });
            saveAndRender();

            const msg = `🦷 *ODONTO PERSONALITÉ*%0AOlá! Novo agendamento solicitado:%0A*Dentista:* ${dentist}%0A*Data:* ${date}%0A*Período:* ${period}`;
            window.open(`https://wa.me/${db.config.wa.replace(/\D/g,'')}?text=${msg}`, '_blank');
        }

        // --- UI & RENDER ---
        function switchTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + id).classList.add('nav-active');
            
            if(id === 'manager') initKanban();
            if(id === 'dentist') {
                if(!calendar) initCalendar();
                else {
                    setTimeout(() => { calendar.render(); refreshCalendar(); }, 100);
                }
            }
        }

        function saveAndRender() { render(); push(); }

        function render() {
            const dOptions = db.dentists.map(d => `<option value="${d.name}">${d.name} (${d.spec})</option>`).join('');
            document.getElementById('c-dentist').innerHTML = dOptions;
            document.getElementById('calendar-filter').innerHTML = `<option value="all">Todos os Dentistas</option>` + dOptions;
            document.getElementById('cfg-wa').value = db.config.wa || "";

            const card = (a) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 card cursor-grab" data-id="${a.id}">
                    <p class="font-black text-sm">${a.dentist}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${a.date} | ${a.period}</p>
                </div>`;
            
            document.getElementById('list-pending').innerHTML = db.appointments.filter(a => a.status === 'pending').map(card).join('');
            document.getElementById('list-active').innerHTML = db.appointments.filter(a => a.status === 'active').map(card).join('');
            document.getElementById('list-done').innerHTML = db.appointments.filter(a => a.status === 'done').map(card).join('');
        }

        function initKanban() {
            ['list-pending', 'list-active', 'list-done'].forEach(cid => {
                new Sortable(document.getElementById(cid), {
                    group: 'tasks',
                    animation: 150,
                    onEnd: (evt) => {
                        const id = evt.item.dataset.id;
                        const status = evt.to.id.replace('list-', '');
                        const idx = db.appointments.findIndex(a => a.id == id);
                        db.appointments[idx].status = status;
                        push();
                    }
                });
            });
        }

        function updateStatus(on, txt) {
            const s = document.getElementById('sync-indicator');
            s.className = `flex items-center gap-1 text-[9px] font-black uppercase tracking-widest ${on ? 'text-emerald-500' : 'text-rose-500'}`;
            s.querySelector('span').innerText = txt;
        }

        function saveConfigs() { db.config.wa = document.getElementById('cfg-wa').value; saveAndRender(); }
        function forceSync() { sync(); }

        // Inicialização
        sync();
        switchTab('client');
    </script>
</body>
</html>
