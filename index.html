<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odonto Personalité | Gestão Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .nav-active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .kanban-column { min-height: 400px; border-radius: 1.5rem; background: #e2e8f0; padding: 1rem; }
        .card { transition: transform 0.2s, box-shadow 0.2s; cursor: grab; }
        .card:active { cursor: grabbing; transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-700 to-blue-400 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-tooth text-xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg text-slate-800">Odonto<span class="text-blue-600">Personalité</span></h1>
                    <div id="sync-status" class="text-[9px] font-black uppercase tracking-tighter text-slate-400 flex items-center gap-1">
                        <i class="fas fa-circle text-[6px]"></i> <span>Desconectado</span>
                    </div>
                </div>
            </div>

            <div class="flex bg-slate-200/50 p-1 rounded-2xl border border-slate-200">
                <button onclick="switchTab('client')" id="tab-client" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">CLIENTE</button>
                <button onclick="switchTab('manager')" id="tab-manager" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">GERENTE</button>
                <button onclick="switchTab('dentist-login')" id="tab-dentist-login" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all">DENTISTA</button>
                <button onclick="openSettings()" id="tab-settings" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold transition-all"><i class="fas fa-lock"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <section id="view-client" class="max-w-lg mx-auto py-10 space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-blue-50">
                <h2 class="text-3xl font-black text-slate-800 text-center mb-8">Marque sua <span class="text-blue-600">Consulta</span></h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Especialista</label>
                        <select id="c-dentist" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="c-date" class="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                        <select id="c-period" class="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                            <option value="Manhã">Manhã</option>
                            <option value="Tarde">Tarde</option>
                        </select>
                    </div>
                    <button onclick="makeBooking()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all active:scale-95">SOLICITAR VIA WHATSAPP</button>
                </div>
            </div>
        </section>

        <section id="view-manager" class="hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="kanban-column">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-4 px-2">Pendentes</h3>
                    <div id="list-pending" class="space-y-3 min-h-[100px]"></div>
                </div>
                <div class="kanban-column">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-4 px-2">Em Atendimento</h3>
                    <div id="list-active" class="space-y-3 min-h-[100px]"></div>
                </div>
                <div class="kanban-column">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-4 px-2">Concluídos</h3>
                    <div id="list-done" class="space-y-3 min-h-[100px]"></div>
                </div>
            </div>
        </section>

        <section id="view-dentist-login" class="hidden max-w-sm mx-auto py-20">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-center">
                <i class="fas fa-user-md text-4xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-black mb-6">Acesso do Profissional</h3>
                <input type="text" id="d-user" placeholder="Usuário" class="w-full p-3 border rounded-xl mb-3 outline-none">
                <input type="password" id="d-pass" placeholder="Senha" class="w-full p-3 border rounded-xl mb-4 outline-none">
                <button onclick="loginDentist()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Entrar na Agenda</button>
            </div>
        </section>

        <section id="view-settings" class="hidden max-w-4xl mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <h3 class="font-black mb-4"><i class="fab fa-github"></i> Sincronização Cloud</h3>
                    <div class="space-y-3">
                        <input type="text" id="db-user" value="paulojosemsousa-stack" class="w-full p-3 bg-slate-100 border rounded-xl text-sm" readonly>
                        <input type="text" id="db-repo" value="odontopersonalite" class="w-full p-3 bg-slate-100 border rounded-xl text-sm" readonly>
                        <input type="password" id="db-token" value="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" class="w-full p-3 bg-slate-100 border rounded-xl text-sm">
                        <button onclick="syncDB()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Sincronizar Agora</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <h3 class="font-black mb-4"><i class="fas fa-user-plus"></i> Novo Profissional</h3>
                    <div class="space-y-3">
                        <input type="text" id="new-d-name" placeholder="Nome Completo" class="w-full p-3 border rounded-xl text-sm outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="new-d-user" placeholder="Usuário" class="p-3 border rounded-xl text-sm outline-none">
                            <input type="text" id="new-d-pass" placeholder="Senha" class="p-3 border rounded-xl text-sm outline-none">
                        </div>
                        <button onclick="addDentistCloud()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Cadastrar</button>
                    </div>
                    <div id="list-dentists-config" class="mt-4 space-y-2"></div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-3xl border border-slate-200">
                <h3 class="font-black mb-4">Configurações Gerais</h3>
                <input type="text" id="cfg-manager-wa" placeholder="WhatsApp do Gerente (55119...)" class="w-full p-3 border rounded-xl outline-none">
                <button onclick="saveGeneralConfigs()" class="mt-3 bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold">Salvar Parâmetros</button>
            </div>
        </section>

    </main>

    <script>
        let db = { dentists: [], appointments: [], config: { waManager: "" } };
        let currentSha = null;

        // --- SEGURANÇA ---
        function openSettings() {
            const pass = prompt("Digite a senha de administrador:");
            if (pass === "JJPJ") {
                switchTab('settings');
            } else {
                alert("Senha incorreta!");
            }
        }

        // --- COMUNICAÇÃO GITHUB ---
        async function syncDB() {
            const user = document.getElementById('db-user').value;
            const repo = document.getElementById('db-repo').value;
            const token = document.getElementById('db-token').value;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    headers: { Authorization: `token ${token}` }
                });
                const data = await res.json();
                currentSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                updateStatus(true, "Online");
                render();
            } catch (e) {
                updateStatus(false, "Erro");
            }
        }

        async function pushDB() {
            const user = document.getElementById('db-user').value;
            const repo = document.getElementById('db-repo').value;
            const token = document.getElementById('db-token').value;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/db.json`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Sync OdontoPersonalite",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: currentSha
                    })
                });
                const data = await res.json();
                currentSha = data.content.sha;
                updateStatus(true, "Salvo");
            } catch (e) { console.error(e); }
        }

        // --- NEGÓCIO ---
        function addDentistCloud() {
            const name = document.getElementById('new-d-name').value;
            const user = document.getElementById('new-d-user').value;
            const pass = document.getElementById('new-d-pass').value;
            if (name && user && pass) {
                db.dentists.push({ id: Date.now(), name, user, pass });
                document.getElementById('new-d-name').value = '';
                document.getElementById('new-d-user').value = '';
                document.getElementById('new-d-pass').value = '';
                saveAndRender();
            }
        }

        function saveGeneralConfigs() {
            db.config.waManager = document.getElementById('cfg-manager-wa').value;
            saveAndRender();
        }

        function makeBooking() {
            const dentist = document.getElementById('c-dentist').value;
            const date = document.getElementById('c-date').value;
            const period = document.getElementById('c-period').value;

            if(!date || !db.config.waManager) return alert("Preencha a data e verifique o WhatsApp nas configurações!");

            db.appointments.push({ id: Date.now(), dentist, date, period, status: 'pending' });
            saveAndRender();

            const msg = `🦷 *NOVO AGENDAMENTO*%0A*Dentista:* ${dentist}%0A*Data:* ${date}%0A*Período:* ${period}`;
            window.open(`https://wa.me/${db.config.waManager.replace(/\D/g,'')}?text=${msg}`, '_blank');
        }

        function loginDentist() {
            const user = document.getElementById('d-user').value;
            const pass = document.getElementById('d-pass').value;
            const prof = db.dentists.find(d => d.user === user && d.pass === pass);

            if (prof) {
                alert(`Bem-vindo, Dr(a). ${prof.name}! Exibindo sua agenda...`);
                // Aqui você pode filtrar o Kanban apenas para este dentista se desejar
                switchTab('manager');
            } else {
                alert("Usuário ou senha inválidos.");
            }
        }

        // --- UI ---
        function saveAndRender() { render(); pushDB(); }

        function render() {
            document.getElementById('c-dentist').innerHTML = db.dentists.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
            document.getElementById('list-dentists-config').innerHTML = db.dentists.map(d => `
                <div class="flex justify-between items-center p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                    <span>${d.name} (${d.user})</span>
                    <button onclick="removeD(${d.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('cfg-manager-wa').value = db.config.waManager || "";

            const card = (a) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 card" data-id="${a.id}">
                    <p class="font-black text-sm">${a.dentist}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${a.date} | ${a.period}</p>
                </div>
            `;
            document.getElementById('list-pending').innerHTML = db.appointments.filter(a => a.status === 'pending').map(card).join('');
            document.getElementById('list-active').innerHTML = db.appointments.filter(a => a.status === 'active').map(card).join('');
            document.getElementById('list-done').innerHTML = db.appointments.filter(a => a.status === 'done').map(card).join('');
        }

        function removeD(id) { db.dentists = db.dentists.filter(d => d.id !== id); saveAndRender(); }

        function switchTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + id).classList.add('nav-active');
            if (id === 'manager') initSortable();
        }

        function updateStatus(on, txt) {
            const s = document.getElementById('sync-status');
            s.className = `text-[9px] font-black uppercase tracking-tighter flex items-center gap-1 ${on ? 'text-emerald-500' : 'text-rose-500'}`;
            s.querySelector('span').innerText = txt;
        }

        function initSortable() {
            ['list-pending', 'list-active', 'list-done'].forEach(cid => {
                new Sortable(document.getElementById(cid), {
                    group: 'tasks',
                    animation: 150,
                    onEnd: (evt) => {
                        const id = evt.item.dataset.id;
                        const status = evt.to.id.replace('list-', '');
                        const idx = db.appointments.findIndex(a => a.id == id);
                        db.appointments[idx].status = status;
                        pushDB();
                    }
                });
            });
        }

        // Início automático
        syncDB();
        switchTab('client');
    </script>
</body>
</html>
